<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Patada de Clandestino</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;min-height:100%;background:#0d0b0a;color:#efe6d6;
    font-family:'Oswald',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:10px}
  #game{width:min(96vw, calc((100dvh - 200px) * 1.7037), 920px);aspect-ratio:920/540;
    border-radius:6px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.7),0 0 0 1px #2a241c}
  #game canvas{display:block}
  .rotate{display:none;font-size:12px;color:#e8c15a}
  .hint{font-size:14px;color:#c9b58a;text-align:center;line-height:1.9;max-width:900px;letter-spacing:.5px}
  .hint b{color:#e8c15a}
  a.back{font-family:'Special Elite',monospace;font-size:13px;color:#9ab0c0;text-decoration:none;opacity:.8}
  kbd{background:#221d16;border:1px solid #453a29;border-radius:4px;padding:1px 7px;color:#efe6d6}
  #pad{display:flex;justify-content:space-between;width:min(920px,100%);gap:16px;
    user-select:none;-webkit-user-select:none;touch-action:none}
  .cluster{display:flex;gap:10px;flex-wrap:wrap}
  .btn{width:66px;height:66px;border-radius:14px;border:2px solid #4a3a26;
    background:#221d16;color:#efe6d6;font-family:'Oswald';font-size:15px;font-weight:700;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 4px 0 #0d0b08;transition:transform .05s;text-align:center}
  .btn:active,.btn.on{transform:translateY(3px);box-shadow:0 1px 0 #0d0b08;background:#3a2f20}
  .btn.hit{border-color:#e0432a;color:#ffcf7a}
  .btn.jump{border-color:#8fb14a}
  .topbtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .refresh{background:#221d16;border:2px solid #4a3a26;color:#e8c15a;font-family:'Oswald';
    font-weight:700;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;letter-spacing:.5px}
  .refresh:active{transform:translateY(2px)}
  /* responsivo: pantallas chicas */
  @media (max-width:640px){
    body{gap:8px;padding:6px}
    .hint{font-size:11px;line-height:1.7}
    #pad{gap:8px}
    .btn{width:52px;height:52px;font-size:12px;border-radius:11px}
    kbd{display:none}
  }
  /* aviso girar el celular (sólo vertical y chico) */
  @media (max-width:640px) and (orientation:portrait){
    .rotate{display:block}
  }
  /* pantallas bajas (celular en horizontal): achicar controles */
  @media (max-height:520px){
    body{gap:6px;padding:4px;justify-content:flex-start}
    .rotate{display:none}
    .hint{font-size:10px;line-height:1.5}
    #pad{gap:6px}
    .btn{width:46px;height:46px;font-size:11px;border-radius:10px}
    kbd{display:none}
    a.back{display:none}
  }
  /* CELULAR HORIZONTAL: juego a pantalla completa, controles superpuestos */
  @media (orientation:landscape) and (max-height:600px){
    body{padding:0;gap:0;justify-content:center}
    .rotate,.hint,a.back{display:none}
    #game{width:min(100vw, calc((100dvh - 4px) * 1.7037));max-width:none;aspect-ratio:920/540}
    #pad{position:fixed;left:0;right:0;bottom:8px;width:auto;padding:0 10px;
      justify-content:space-between;pointer-events:none;background:none;z-index:5}
    #pad .cluster{gap:8px}
    #pad .btn{pointer-events:auto;opacity:.85;width:50px;height:50px;font-size:11px}
    .topbtns{position:fixed;top:6px;right:8px;z-index:6}
    .refresh{font-size:11px;padding:4px 9px}
  }
</style>
</head>
<body>
  <div class="topbtns">
    <button class="refresh" type="button" onclick="this.textContent = Sfx.toggleMusic() ? '🔇 Música' : '🔊 Música'">🔊 Música</button>
    <button class="refresh" type="button" onclick="location.replace(location.pathname+'?v='+Date.now())">🔄 Actualizar</button>
  </div>
  <div class="rotate">📱↔️ Girá el teléfono para verlo más grande</div>
  <div id="game"></div>
  <div class="hint">
    <b>EL PRESIDENTE</b> &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> mover &nbsp; <kbd>↑</kbd> saltar &nbsp; <kbd>↓</kbd> cubrirse &nbsp; <kbd>Z</kbd> puño &nbsp; <kbd>X</kbd> patada &nbsp;·&nbsp; <kbd>Enter</kbd> reiniciar
  </div>
  <div id="pad">
    <div class="cluster">
      <div class="btn" data-k="left">◀</div>
      <div class="btn jump" data-k="up">▲<br>SALTO</div>
      <div class="btn" data-k="right">▶</div>
      <div class="btn" data-k="down">CUBRIR</div>
    </div>
    <div class="cluster">
      <div class="btn hit" data-k="punch">PUÑO</div>
      <div class="btn hit" data-k="kick">PATADA</div>
    </div>
  </div>
  <a class="back" href="seleccion.html">← ver pantalla de selección</a>

  <script src="vendor/phaser.min.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
