<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Juego Clandestino</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;height:100%;background:#0d0b0a;color:#efe6d6;
    font-family:'Oswald',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  #game{border-radius:6px;box-shadow:0 18px 50px rgba(0,0,0,.7),0 0 0 1px #2a241c}
  .hint{font-size:14px;color:#c9b58a;text-align:center;line-height:1.9;max-width:900px;letter-spacing:.5px}
  .hint b{color:#e8c15a}
  a.back{font-family:'Special Elite',monospace;font-size:13px;color:#9ab0c0;text-decoration:none;opacity:.8}
  kbd{background:#221d16;border:1px solid #453a29;border-radius:4px;padding:1px 7px;color:#efe6d6}
  #pad{display:flex;justify-content:space-between;width:min(920px,100%);gap:16px;
    user-select:none;-webkit-user-select:none;touch-action:none}
  .cluster{display:flex;gap:10px;flex-wrap:wrap}
  .btn{width:66px;height:66px;border-radius:14px;border:2px solid #4a3a26;
    background:#221d16;color:#efe6d6;font-family:'Oswald';font-size:15px;font-weight:700;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 4px 0 #0d0b08;transition:transform .05s;text-align:center}
  .btn:active,.btn.on{transform:translateY(3px);box-shadow:0 1px 0 #0d0b08;background:#3a2f20}
  .btn.hit{border-color:#e0432a;color:#ffcf7a}
  .btn.jump{border-color:#8fb14a}
</style>
</head>
<body>
  <div id="game"></div>
  <div class="hint">
    <b>EL PRESIDENTE</b> &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> mover &nbsp; <kbd>↑</kbd> saltar &nbsp; <kbd>↓</kbd> cubrirse &nbsp; <kbd>Z</kbd> puño &nbsp; <kbd>X</kbd> patada &nbsp;·&nbsp; <kbd>Enter</kbd> reiniciar
  </div>
  <div id="pad">
    <div class="cluster">
      <div class="btn" data-k="left">◀</div>
      <div class="btn jump" data-k="up">▲<br>SALTO</div>
      <div class="btn" data-k="right">▶</div>
      <div class="btn" data-k="down">CUBRIR</div>
    </div>
    <div class="cluster">
      <div class="btn hit" data-k="punch">PUÑO</div>
      <div class="btn hit" data-k="kick">PATADA</div>
    </div>
  </div>
  <a class="back" href="seleccion.html">← ver pantalla de selección</a>

  <script src="vendor/phaser.min.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
